<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CITI MOTORS - Job Application</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background-color: #f8f9fa;
}

.form-container {
    background: white;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    max-width: 650px;   /* 👈 limits width */
    margin: auto;       /* 👈 centers it */
}

.apply-title {
    font-weight: 600;
    margin-bottom: 20px;
    text-align: center;
}

.logo-container {
    text-align: center;
    margin-bottom: 25px;
}

.submit-btn {
    background-color: #000;
    color: white;
    border: none;
    padding: 10px 25px;
    border-radius: 5px;
}

.submit-btn:hover {
    background-color: #333;
}
</style>
</head>

<body>

<div class="form-container">

    <!-- LOGO -->
    <div class="logo-container text-center mb-3">
        <img src="../img/logo.png" alt="CITI MOTORS Logo"
             style="max-width:160px; height:auto;">
    </div>

    <h3 class="apply-title text-center">Job Application Form</h3>

    <form id="applicationForm">

        <!-- Position -->
        <div class="mb-3">
            <label class="form-label">Position Applying For</label>
            <input type="text" class="form-control" id="position" readonly>
        </div>

        <!-- 2 Column Row -->
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Contact Number</label>
                <input type="text" class="form-control" required>
            </div>
        </div>

        <!-- 2 Column Row -->
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Upload Resume</label>
                <input type="file" class="form-control" required>
            </div>
        </div>

        <!-- Buttons -->
        <div class="d-flex justify-content-between mt-4">
            <a href="jobs.html" class="btn btn-outline-dark">← Back to Jobs</a>
            <button type="submit" class="submit-btn">Submit Application</button>
        </div>

    </form>

</div>

<script>
// Get position from URL
const urlParams = new URLSearchParams(window.location.search);
const position = urlParams.get('position');

if(position){
    document.getElementById('position').value = position;
}

</script>

</body>
</html>
